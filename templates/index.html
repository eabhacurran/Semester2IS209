<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Dog</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="background-circle circle-one"></div>
  <div class="background-circle circle-two"></div>

  <div class="container">

    <div class="main-card">
      <div class="small-tag">Dog Gallery App</div>

      <h1>🐶 Random Dog</h1>
      <p class="subtitle">Fetch a random dog and save your favourites</p>

      <div class="image-box">
        <img src="{{ dog_image }}" alt="dog" class="dog-img">
      </div>

      <h2>{{ dog_name if dog_name else "Unknown Dog" }}</h2>

      <div class="buttons">
        <form action="/save" method="POST">
          <input type="hidden" name="dog_image" value="{{ dog_image }}">
          <input type="hidden" name="dog_name" value="{{ dog_name if dog_name else 'Unknown Dog' }}">
          <button type="submit" class="save-btn">Save Dog</button>
        </form>

        <form action="/" method="GET">
          <button type="submit" class="load-btn">Load Another</button>
        </form>
      </div>
    </div>

    <div class="saved-section">
      <div class="saved-top">
        <h3>Saved Dogs</h3>
        <span class="count-box">{{ saved_dogs|length }} saved</span>
      </div>

      {% if saved_dogs %}
        <div class="saved-grid">
          {% for dog in saved_dogs %}
            <div class="saved-card">
              <img src="{{ dog.image }}" alt="{{ dog.name }}">
              <div class="saved-info">
                <p>{{ dog.name }}</p>
              </div>
            </div>
          {% endfor %}
        </div>
      {% else %}
        <div class="empty-box">
          <p>No dogs saved yet.</p>
        </div>
      {% endif %}
    </div>

  </div>

</body>
</html>
